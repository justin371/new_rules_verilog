name: YAPF Formatting Check

on:
  pull_request:
    paths:
      - "**/*.py"
      - ".style.yapf"
      - "requirements-format.txt"

permissions:
  contents: read

jobs:
  formatting-check:
    name: Formatting Check
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install YAPF
        run: python -m pip install --require-hashes --only-binary=:all: -r requirements-format.txt

      - name: Run YAPF python style checks
        shell: bash
        run: |
          git diff -U0 --no-color \
            "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" -- '*.py' \
            | yapf-diff --style .style.yapf > yapf.patch
          test ! -s yapf.patch || { cat yapf.patch; exit 1; }
