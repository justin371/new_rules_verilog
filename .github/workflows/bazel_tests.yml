name: Run Bazel Tests

on:
  pull_request:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  bazel-tests:
    name: Bazel Tests
    runs-on: ubuntu-24.04
    env:
      USE_BAZEL_VERSION: "7.7.1"
    steps:
      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: install-python-dependencies
        run: 'python -m pip install --require-hashes --only-binary=:all: -r requirements.txt'

      - name: install-bazelisk
        uses: vsco/bazelisk-action@170327f90b7b6c4364a97741d6e64f888d76bcb5
        with:
          version: '1.7.5'
          bazel-install-path: './.local/bin'
          os: 'linux'

      - name: run-bazel-checks
        run: |
          bazel test --test_output=errors //:buildifier_diff //tests/... //examples/dpi:dpi_c_test
          bazel build --config=vcs //examples/apb:test //examples/dpi:test
          bazel run //:buildifier_lint

      - name: check-generated-docs
        run: ./tests/doc_test.sh

      - name: check-external-workspace-setup
        run: bash ./tests/external_setup_smoke_test.sh

  redhat-smoke:
    name: Red Hat-compatible smoke
    runs-on: ubuntu-24.04
    container: rockylinux:9@sha256:d7be1c094cc5845ee815d4632fe377514ee6ebcf8efaed6892889657e5ddaaa6
    env:
      USE_BAZEL_VERSION: "7.7.1"
    steps:
      - name: install-system-dependencies
        run: dnf install -y gcc gcc-c++ git gzip python3.12 python3.12-pip tar unzip which zip

      - name: checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: install-python-dependencies
        run: 'python3.12 -m pip install --require-hashes --only-binary=:all: -r requirements.txt'

      - name: install-bazelisk
        uses: vsco/bazelisk-action@170327f90b7b6c4364a97741d6e64f888d76bcb5
        with:
          version: '1.7.5'
          bazel-install-path: '${{ runner.temp }}/bazelisk-bin'
          os: 'linux'

      - name: run-redhat-smoke
        run: ./tests/redhat_smoke.sh
