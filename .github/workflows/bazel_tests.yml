name: Run Bazel Tests

on:
  pull_request:
    paths:
      - ".bazelrc"
      - ".github/workflows/**"
      - "BUILD"
      - "WORKSPACE"
      - "requirements.txt"
      - "**/*.bzl"
      - "**/BUILD"
      - "bin/**"
      - "deps/**"
      - "lib/**"
      - "simulators/**"
      - "tests/**"
      - "vendors/**"
      - "verilog/**"

jobs:
  bazel-tests:
    name: Bazel Tests
    runs-on: ubuntu-latest
    env:
      USE_BAZEL_VERSION: "7.7.1"
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: install-python-dependencies
        run: python -m pip install -r requirements.txt
      
      - name: install-bazelisk
        uses: vsco/bazelisk-action@170327f90b7b6c4364a97741d6e64f888d76bcb5
        with:
          version: '1.7.5'
          bazel-install-path: './.local/bin'
          os: 'linux'

      - name: run-bazel-checks
        run: bazel test --test_output=errors //:buildifier_test //tests:all //tests/vcs_filelist_validation:all
